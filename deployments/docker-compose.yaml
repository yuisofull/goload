version: '3.8'

services:
  mysql:
    image: mysql:9.3.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: goload
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - goload-net

  broker:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: broker
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@broker:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    ports:
      - "9092:9092"
    healthcheck:
      test: kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - goload-net

  redis:
    image: redis:8.0.2
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - goload-net

  minio:
    image: quay.io/minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - goload-net

  apigateway:
    build:
      context: ..
      dockerfile: ./deployments/dockerfiles/Dockerfile.apigateway
    depends_on:
      mysql:
        condition: service_healthy
      broker:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
    volumes:
      - ../configs/config.yaml:/app/configs/config.yaml:ro
      - ../migrations:/app/migrations:ro
    ports:
      - "8080:8080"
    networks:
      - goload-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-S", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  migrator:
    build:
      context: ..
      dockerfile: ./deployments/dockerfiles/Dockerfile.migrator
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - SKIP_KAFKA_WAIT=1
    volumes:
      - ../configs/config.yaml:/app/configs/config.yaml:ro
      - ../migrations:/app/migrations:ro
    networks:
      - goload-net
    depends_on:
      - minio
      - bucket-creator

  download:
    build:
      context: ..
      dockerfile: ./deployments/dockerfiles/Dockerfile.download
    depends_on:
      mysql:
        condition: service_healthy
      broker:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
    volumes:
      - ../configs/config.yaml:/app/configs/config.yaml:ro
      - ../migrations:/app/migrations:ro
    networks:
      - goload-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8082 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bucket-creator:
    build:
      context: ..
      dockerfile: ./deployments/dockerfiles/Dockerfile.bucket
    networks:
      - goload-net
    restart: "no"

  authsvc:
    build:
      context: ..
      dockerfile: ./deployments/dockerfiles/Dockerfile.authsvc
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
    volumes:
      - ../configs/config.yaml:/app/configs/config.yaml:ro
      - ../migrations:/app/migrations:ro
    networks:
      - goload-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  task:
    build:
      context: ..
      dockerfile: ./deployments/dockerfiles/Dockerfile.task
    depends_on:
      mysql:
        condition: service_healthy
      broker:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
    volumes:
      - ../configs/config.yaml:/app/configs/config.yaml:ro
      - ../migrations:/app/migrations:ro
    networks:
      - goload-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8082 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  goload-net:
    driver: bridge