openapi: 3.0.3
info:
  title: GoLoad API Gateway
  description: API Gateway for GoLoad
  version: 1.0.0

servers:
  - url: /

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        of_account_id:
          type: integer
          format: uint64
        file_name:
          type: string
        source_url:
          type: string
        source_type:
          type: string
        checksum_type:
          type: string
          nullable: true
        checksum_value:
          type: string
          nullable: true
        status:
          type: string
        progress:
          type: number
          format: float
          nullable: true
        downloaded_bytes:
          type: integer
          format: int64
          nullable: true
        total_bytes:
          type: integer
          format: int64
          nullable: true
        error_message:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: {}
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    AuthAccount:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        account_name:
          type: string

    ListTasksResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        total_count:
          type: integer
          format: int32

    CreateTaskRequest:
      type: object
      description: |
        Request to create a new download task.

        BitTorrent supports two input modes:
        1. URL mode: provide source_url as a .torrent URL or magnet URI.
        2. Upload mode: provide metadata.torrent_file_base64 containing base64-encoded
           .torrent bytes. In this mode source_url can be a placeholder value.
      required:
        - file_name
        - source_url
        - source_type
      properties:
        file_name:
          type: string
          description: Target output file name.
        source_url:
          type: string
          description: |
            Download source.
            - HTTP/HTTPS: direct file URL
            - FTP: FTP URL
            - BITTORRENT: .torrent URL or magnet URI
            Note: when using metadata.torrent_file_base64 upload mode, this field is still
            required by schema and may be set to a placeholder value.
        source_type:
          type: string
          description: Source transport/protocol type.
          enum:
            - HTTP
            - HTTPS
            - FTP
            - BITTORRENT
        checksum_type:
          type: string
          description: Optional checksum algorithm.
        checksum_value:
          type: string
          description: Optional checksum value matching checksum_type.
        metadata:
          type: object
          description: Optional source-specific metadata.
          additionalProperties: true
          properties:
            torrent_file_base64:
              type: string
              description: |
                Base64-encoded .torrent file bytes. Used when source_type=BITTORRENT to
                submit an uploaded torrent file directly in the API request.

    CreateTaskResponse:
      type: object
      properties:
        task:
          $ref: "#/components/schemas/Task"

    GetTaskResponse:
      type: object
      properties:
        task:
          $ref: "#/components/schemas/Task"

    SuccessResponse:
      type: object
      properties:
        Success:
          type: boolean

    CheckFileExistsResponse:
      type: object
      properties:
        Exists:
          type: boolean

    GetTaskProgressResponse:
      type: object
      properties:
        progress:
          type: number
          format: float
        downloaded_bytes:
          type: integer
          format: int64
        total_bytes:
          type: integer
          format: int64

    GenerateDownloadURLRequest:
      type: object
      required:
        - task_id
        - ttl_seconds
        - one_time
      properties:
        task_id:
          type: integer
          format: uint64
        ttl_seconds:
          type: integer
          format: int64
        one_time:
          type: boolean

    GenerateDownloadURLResponse:
      type: object
      properties:
        url:
          type: string
        direct:
          type: boolean

    CreateAccountGatewayRequest:
      type: object
      required:
        - account_name
        - password
      properties:
        account_name:
          type: string
        password:
          type: string

    CreateAccountGatewayResponse:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        account_name:
          type: string

    CreateSessionGatewayRequest:
      type: object
      required:
        - account_name
        - password
      properties:
        account_name:
          type: string
        password:
          type: string

    CreateSessionGatewayResponse:
      type: object
      properties:
        token:
          type: string
        account:
          $ref: "#/components/schemas/AuthAccount"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /api/v1/tasks/list:
    get:
      summary: List tasks
      operationId: listTasks
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
            format: uint64
        - in: query
          name: limit
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTasksResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/create:
    post:
      summary: Create a task
      operationId: createTask
      description: |
        Creates a download task.

        For source_type=BITTORRENT, you can either send:
        - source_url as a magnet URI or .torrent URL
        - metadata.torrent_file_base64 with uploaded .torrent bytes (base64)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
            examples:
              httpUrl:
                summary: HTTP file URL
                value:
                  file_name: sample.iso
                  source_url: https://example.com/sample.iso
                  source_type: HTTPS
              bittorrentMagnet:
                summary: BitTorrent using magnet URI
                value:
                  file_name: ubuntu.iso
                  source_url: magnet:?xt=urn:btih:abcdef1234567890abcdef1234567890abcdef12
                  source_type: BITTORRENT
              bittorrentUploadedTorrent:
                summary: BitTorrent using uploaded .torrent bytes
                value:
                  file_name: ubuntu.iso
                  source_url: uploaded://torrent
                  source_type: BITTORRENT
                  metadata:
                    torrent_file_base64: dGhpcy1pcy1hLWJhc2U2NC1lbmNvZGVkLXRvcnJlbnQtYnl0ZXM=
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTaskResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/get:
    get:
      summary: Get task details
      operationId: getTask
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaskResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/delete:
    delete:
      summary: Delete a task
      operationId: deleteTask
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/pause:
    post:
      summary: Pause a task
      operationId: pauseTask
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/resume:
    post:
      summary: Resume a task
      operationId: resumeTask
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/cancel:
    post:
      summary: Cancel a task
      operationId: cancelTask
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/retry:
    post:
      summary: Retry a task
      operationId: retryTask
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/exists:
    get:
      summary: Check if file exists
      operationId: checkFileExists
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: task_id
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckFileExistsResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/progress:
    get:
      summary: Get task progress
      operationId: getTaskProgress
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: task_id
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaskProgressResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tasks/download-url:
    post:
      summary: Generate download URL
      operationId: generateDownloadUrl
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDownloadURLRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateDownloadURLResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/create:
    post:
      summary: Create an account
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountGatewayRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountGatewayResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/session:
    post:
      summary: Create a session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionGatewayRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionGatewayResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /download:
    get:
      summary: Download a file
      operationId: downloadFile
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial file bytes (Range request)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          description: Error
